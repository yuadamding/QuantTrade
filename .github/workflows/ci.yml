name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: ["dev", "dev,data"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[${{ matrix.extras }}]"
      - name: Compile
        run: python -m compileall -q src scripts
      - name: Lint
        run: python -m ruff check src scripts tests
      - name: Tests
        run: python -m pytest -q --cov=rl_quant --cov-report=term-missing
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
